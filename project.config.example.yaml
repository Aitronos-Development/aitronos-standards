# =============================================================================
# Aitronos Standards — Project Configuration
# =============================================================================
#
# This file tells shared rules, skills, and agents how YOUR project works.
# Every project that uses aitronos-standards must have a project.config.yaml
# in its root directory. Copy this example and fill in your values.
#
# Skills and agents read this file to resolve {{config:*}} placeholders.
# For example, {{config:commands.test.unit}} resolves to whatever you put
# under commands.test.unit below.
#
# Two reference configurations are provided:
#   1. Python/FastAPI backend (active — uncomment nothing)
#   2. Vue/TypeScript frontend (commented out — swap if that's your stack)
# =============================================================================


# -----------------------------------------------------------------------------
# Project Metadata
# -----------------------------------------------------------------------------
# Basic information about the project. Used in generated docs, commit messages,
# and agent context.

project:
  # Human-readable project name
  name: "Freddy.Backend"

  # Project archetype: backend | frontend | fullstack | library | cli
  type: "backend"

  # Primary programming language: python | typescript | go | rust | java | etc.
  language: "python"

  # Primary framework: fastapi | django | flask | vue | react | next.js | gin | etc.
  framework: "fastapi"

  # Package manager: uv | pip | npm | pnpm | yarn | go mod | cargo | etc.
  package_manager: "uv"


# -----------------------------------------------------------------------------
# Commands
# -----------------------------------------------------------------------------
# Shell commands that skills and agents use to build, test, lint, and run
# the project. Leave a value empty ("") if the command does not apply.

commands:
  test:
    # Run unit tests (fast, no external dependencies)
    unit: "uv run pytest tests/unit -x -q -m 'not slow and not e2e'"

    # Run integration tests (may need database, external services)
    integration: "uv run pytest tests/integration -x -q"

    # Run end-to-end tests
    e2e: "uv run pytest tests/e2e -x"

  lint:
    # Check code quality without modifying files
    check: "uvx ruff check ."

    # Auto-fix lint issues
    fix: "uvx ruff check . --fix && uvx ruff format ."

  compliance:
    # Fast compliance checks (skip slow ones like codespell, mypy)
    fast: "python3 scripts/compliance/runner.py"

    # Full compliance including all checks
    full: "python3 scripts/compliance/runner.py --all"

  dev:
    # Start the development server (should auto-reload on code changes)
    start: "./start-dev.sh"

  deps:
    # Install all dependencies
    install: "uv sync"

    # Sync dependencies (update lockfile, install new deps)
    sync: "uv sync"

  migrations:
    # Generate a new migration from model changes
    generate: "uv run alembic revision --autogenerate -m"

    # Apply all pending migrations
    apply: "uv run alembic upgrade head"

  build:
    # Build for development
    dev: ""

    # Build for production
    prod: "docker build -t freddy-backend ."


# -----------------------------------------------------------------------------
# Paths
# -----------------------------------------------------------------------------
# Directory paths relative to the project root. Used by rules and agents to
# know where to find things. Trailing slashes are optional but recommended
# for clarity.

paths:
  # Main application source code
  source: "app/"

  # Test files
  tests: "tests/"

  # Technical specifications and roadmaps
  specs: "docs/.specs/"

  # Public-facing API documentation
  public_docs: "docs/public-docs/"

  # API route definitions (framework-specific)
  routes: "app/api/v1/routes/"

  # Request/response schema definitions
  schemas: "app/api/v1/schemas/"

  # Business logic / service layer
  services: "app/services/"

  # Database models / ORM definitions
  models: "app/services/db/models/"

  # Database repository classes (data access layer)
  repositories: "app/services/db/repositories/"

  # Database migration files
  migrations: "alembic/versions/"


# -----------------------------------------------------------------------------
# Credentials
# -----------------------------------------------------------------------------
# How the dev environment manages authentication credentials for local testing.

credentials:
  # File that contains dev credentials (relative to project root)
  # Set to "" or "none" if your project does not use a credentials file
  file: ".dev-credentials"

  # Command to regenerate fresh credentials
  refresh: "uv run python scripts/development/get_dev_credentials.py"

  # Environment variable names that hold credentials
  variables:
    - ACCESS_TOKEN
    - API_KEY


# -----------------------------------------------------------------------------
# API Testing
# -----------------------------------------------------------------------------
# Configuration for self-testing API endpoints during development.
# Used by the self-testable-code rule and testing skills.

api_testing:
  # Local dev server base URL
  base_url: "http://localhost:8000"

  # Health check endpoint to verify server is running
  health_endpoint: "/health"

  # How Bearer tokens are sent
  auth_header: "Authorization"
  auth_format: "Bearer {token}"

  # How API keys are sent
  api_key_header: "x-api-key"

  # SDK for testing (if your project has one)
  sdk:
    # PyPI/npm package name
    package: "aitronos-sdk"

    # Import statement
    import: "from aitronos import Aitronos"


# -----------------------------------------------------------------------------
# Conventions
# -----------------------------------------------------------------------------
# Project conventions that rules and agents need to know about. These inform
# how code should be structured, not what commands to run.

conventions:
  # Authentication pattern: dual (Bearer + API key) | bearer_only | api_key_only | none
  auth: "dual"

  # Error handling style: custom_exceptions | http_exceptions | result_type
  errors: "custom_exceptions"

  # ID format: prefixed_uuid (usr_abc123) | uuid | auto_increment | ulid
  ids: "prefixed_uuid"

  # Pagination style: cursor | offset | page_number | none
  pagination: "cursor"

  # Database access pattern: async_sqlalchemy | sync_sqlalchemy | prisma | drizzle | raw_sql
  database: "async_sqlalchemy"

  # API response envelope: envelope ({success, data, error}) | flat | json_api
  response: "envelope"


